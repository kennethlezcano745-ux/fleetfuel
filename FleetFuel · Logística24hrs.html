<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --o:#f97316;--o2:#ea6c0a;--bg:#0d0f14;--s1:#151820;--s2:#1c1f2b;--s3:#222636;
  --b1:#272d3d;--b2:#32394f;--t1:#edf0f7;--t2:#8e97b0;--t3:#5c6480;
  --g:#22c55e;--y:#eab308;--r:#ef4444;--bl:#3b82f6;
  --rr:10px;--rl:14px;--rxl:18px;
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:"Segoe UI",system-ui,sans-serif;font-size:14px}
#app{min-height:100vh}
/* SIDEBAR ADMIN */
.admin-wrap{display:flex;height:100vh;overflow:hidden}
.sb{width:220px;min-width:220px;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column}
.sb-logo{padding:14px;border-bottom:1px solid var(--b1)}
.sb-logo img{width:140px}
.sb-nav{flex:1;padding:8px;overflow-y:auto}
.nav-s{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;padding:12px 8px 4px}
.nav-it{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--rr);color:var(--t2);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.nav-it:hover{background:var(--s2);color:var(--t1)}
.nav-it.on{background:rgba(249,115,22,.12);color:var(--o);border:1px solid rgba(249,115,22,.2)}
.nav-it i{font-size:16px}
.nb{margin-left:auto;background:var(--r);color:#fff;border-radius:20px;font-size:10px;font-weight:700;padding:1px 6px}
.sb-foot{padding:10px 14px;border-top:1px solid var(--b1);font-size:11px;color:var(--t3)}
/* CONTENT */
.cnt{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.tbar{height:50px;min-height:50px;background:var(--s1);border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;padding:0 18px;position:sticky;top:0;z-index:40}
.tbar-t{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.tbar-t i{color:var(--o)}
.pg{padding:18px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--rr);border:1px solid var(--b2);background:var(--s2);color:var(--t1);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;font-family:inherit}
.btn:hover{border-color:var(--o);color:var(--o)}
.btn.pr{background:var(--o);border-color:var(--o);color:#fff;font-weight:600}
.btn.pr:hover{background:var(--o2)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.xs{padding:3px 8px;font-size:11px}
.btn.ic{width:30px;height:30px;padding:0;justify-content:center}
.btn.gh{border-color:transparent;background:transparent;color:var(--t2)}
.btn.gh:hover{background:var(--s2);color:var(--t1)}
.btn:disabled{opacity:.5;cursor:not-allowed}
/* CARDS */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:16px}
.card-s{background:var(--s2);border:1px solid var(--b1);border-radius:var(--rr);padding:12px}
/* GRID */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
/* METRICS */
.met{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rr);padding:14px}
.met-i{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;margin-bottom:9px}
.met-l{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.met-v{font-size:21px;font-weight:700}
/* TABLE */
.tw{overflow-x:auto;border-radius:var(--rr);border:1px solid var(--b1)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--s2)}
th{text-align:left;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;padding:9px 12px;white-space:nowrap}
td{padding:9px 12px;border-top:1px solid var(--b1)}
tr:hover td{background:rgba(255,255,255,.015)}
/* BADGES */
.bdg{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.b-ok{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.b-wn{background:rgba(234,179,8,.12);color:#fbbf24;border:1px solid rgba(234,179,8,.2)}
.b-dn{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.b-or{background:rgba(249,115,22,.12);color:var(--o);border:1px solid rgba(249,115,22,.2)}
/* FORM */
.lbl{display:block;font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.inp{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:var(--rr);color:var(--t1);padding:8px 11px;font-size:13px;outline:none;transition:border .15s;font-family:inherit}
.inp:focus{border-color:var(--o);box-shadow:0 0 0 3px rgba(249,115,22,.1)}
.inp::placeholder{color:var(--t3)}
select.inp option{background:var(--s2)}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.fg{margin-bottom:12px}
/* LOGIN */
.lw{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;background:var(--bg);padding:16px;overflow-y:auto}
.lc{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rxl);padding:24px 20px;width:100%;max-width:420px;text-align:center;margin:auto}
.lc img{width:160px;margin-bottom:16px}
/* CHOFER */
.ch-wrap{min-height:100vh;display:flex;flex-direction:column;background:var(--bg);overflow-y:auto}
.ch-hdr{background:var(--s1);border-bottom:1px solid var(--b1);padding:11px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0}
.ch-hdr img{height:36px;width:auto}
.ch-plate{font-size:18px;font-weight:800;letter-spacing:2px;color:var(--o)}
.ch-body{flex:1;padding:14px;max-width:500px;margin:0 auto;width:100%;padding-bottom:40px}
/* UPLOAD */
.upz{border:2px dashed var(--b2);border-radius:var(--rl);background:var(--s2);padding:6px}
/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
.mdl{background:var(--s1);border:1px solid var(--b2);border-radius:var(--rxl);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.6)}
.mh{padding:16px 20px 12px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
.mb2{padding:18px 20px}
.mf{padding:12px 20px;border-top:1px solid var(--b1);display:flex;justify-content:flex-end;gap:8px}
/* TOAST */
.toast{position:fixed;bottom:16px;right:16px;background:var(--s1);border:1px solid var(--b2);border-radius:var(--rr);padding:10px 14px;font-size:13px;z-index:999;display:flex;align-items:center;gap:9px;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:tIn .2s ease;max-width:300px}
@keyframes tIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
/* VEH CARD */
.vc{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rl);padding:14px;position:relative}
.vc-pl{font-size:17px;font-weight:800;letter-spacing:1.5px;margin-bottom:2px;cursor:pointer}
.vc-pl:hover{color:var(--o)}
.vc-dr{font-size:12px;color:var(--t3);margin-bottom:10px}
.vc-r{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid rgba(42,47,64,.8)}
.vc-r:last-of-type{border-bottom:none}
.sdot{width:8px;height:8px;border-radius:50%;position:absolute;top:12px;right:12px}
/* MNAV */
.mnav{display:flex;align-items:center;gap:7px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--rr);padding:4px 9px;font-size:13px;font-weight:500}
/* AI BOX */
.aib{background:rgba(249,115,22,.05);border:1px solid rgba(249,115,22,.22);border-radius:var(--rl);padding:13px;margin-top:10px}
.aih{display:flex;align-items:center;gap:7px;font-weight:600;font-size:13px;color:var(--o);margin-bottom:10px}
.air{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(249,115,22,.1);font-size:12px}
.air:last-child{border-bottom:none}
.spin{animation:sp 1s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
/* SYNC */
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--g);display:inline-block;margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* UTILS */
.fl{display:flex}.ic{align-items:center}.jb{justify-content:space-between}
.g6{gap:6px}.g8{gap:8px}.g10{gap:10px}.g12{gap:12px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb14{margin-bottom:14px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}
.mt8{margin-top:8px}.mt10{margin-top:10px}.mt12{margin-top:12px}
.t2{color:var(--t2)}.t3{color:var(--t3)}.sm{font-size:12px}.xs{font-size:11px}
.fw6{font-weight:600}.fw7{font-weight:700}.fw8{font-weight:800}
.wf{width:100%}.tc{text-align:center}.cw{position:relative}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
@media(max-width:700px){
  .sb{display:none}
  .g4{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr}
  .g2{grid-template-columns:1fr}
  .fr2{grid-template-columns:1fr}
  .pg{padding:12px}
  .tbar{padding:0 12px}
}
</style>
</head>

    const vals=vr.map(r=>kpl(r));

function vehPwd(plate){const c=plate.replace(/[-\s]/g,'');return c.slice(-4).toUpperCase();}
function checkPwd(plate,input){const s=localStorage.getItem('pwd_'+plate.replace(/[-\s]/g,''));return s?s===input:input===vehPwd(plate);}

// ═══════════ FIREBASE ═══════════
function initFB(){
  try{
    if(!firebase.apps.length)firebase.initializeApp(FB_CFG);
    db=firebase.firestore();fbReady=true;
    console.log('Firebase OK');return true;
  }catch(e){console.log('Firebase error:',e);return false;}
}
async function syncFB(){
  if(!fbReady)return;
  try{
    const vs=await db.collection('vehicles').orderBy('plate').get();
    if(vs.docs.length>0){VEHS=vs.docs.map(d=>({id:d.id,...d.data()}));saveLocal();}
    const rs=await db.collection('fuel_records').orderBy('date','desc').get();
    RECS=rs.docs.map(d=>({id:d.id,...d.data()}));saveLocal();
    if(S.mode==='admin')renderAdminContent();
    if(S.mode==='login')renderLoginVehs();
    console.log('Sync OK:',VEHS.length,'vehs,',RECS.length,'recs');
  }catch(e){console.log('Sync error:',e);}
}
async function saveRec(rec){
  const id=uid();
  const nr={id,vid:rec.vid,date:rec.date,L:parseFloat(rec.L)||0,amt:parseFloat(rec.amt)||0,km1:parseInt(rec.km1)||0,km0:parseInt(rec.km0)||0,sta:rec.sta||'',note:rec.note||'',driver_name:rec.driver_name||'',month:new Date(rec.date).getMonth(),year:new Date(rec.date).getFullYear()};
  RECS.unshift(nr);
  VEHS=VEHS.map(v=>(v.id||v.plate)===rec.vid&&parseInt(rec.km1)>(v.km||0)?{...v,km:parseInt(rec.km1)}:v);
  saveLocal();
  if(fbReady){try{await db.collection('fuel_records').doc(id).set({...nr,createdAt:firebase.firestore.FieldValue.serverTimestamp()});const veh=VEHS.find(v=>(v.id||v.plate)===rec.vid);if(veh&&veh.id)await db.collection('vehicles').doc(veh.id).update({km:parseInt(rec.km1)});}catch(e){}}
  return id;
}
async function saveVeh(v){
  const id=v.id||uid();
  const nv={id,plate:v.plate,driver:v.driver||'',type:v.type||'',km:parseInt(v.km)||0,region:v.region||''};
  const idx=VEHS.findIndex(x=>(x.id||x.plate)===id);
  if(idx>=0)VEHS[idx]=nv;else VEHS.push(nv);
  saveLocal();
  if(fbReady){try{await db.collection('vehicles').doc(id).set({plate:nv.plate,driver:nv.driver,type:nv.type,km:nv.km,region:nv.region});}catch(e){}}
  return id;
}
async function delVeh(vid){
  VEHS=VEHS.filter(v=>(v.id||v.plate)!==vid);saveLocal();
  if(fbReady){try{await db.collection('vehicles').doc(vid).delete();}catch(e){}}
}

      const avgK=mkpls.length?(mkpls.reduce((s,x)=>s+x,0)/mkpls.length).toFixed(2):'—';

      vc.innerHTML=`<div class="fl ic jb mb10" style="flex-wrap:wrap;gap:6px"><div><div style="font-size:16px;font-weight:800;letter-spacing:1px">${v.plate}</div><div class="xs t3">${v.driver||''} · ${v.type||''} · ${v.region||''}</div></div><span class="bdg b-or">${mvr.length} cargas</span></div>`;
      // Stats
      const st=div('','');st.style.cssText='display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px';
      [['Litros',tL.toFixed(1)+' L'],['Gasto','$'+tA.toFixed(2)],['Precio/L',tL>0?'$'+(tA/tL).toFixed(3):'—'],['Prom. km/L',avgK]].forEach(([k,val])=>{
        const s=div('card-s tc',`<div class="xs t3 mb8">${k}</div><div class="fw7" style="font-size:14px">${val}</div>`);
        st.appendChild(s);
      });
      vc.appendChild(st);
      // Gráfico solo si es el primero seleccionado
      if(S.histSelVehs[0]===vid&&pts.length>1)vc.innerHTML+=`<div class="cw mb10" style="height:180px"><canvas id="_hc"></canvas></div><div class="xs t3 tc mb10">Prom. histórico: <strong style="color:var(--o)">${ga?.toFixed(2)} km/L</strong> · Puntos rojos = anomalía</div>`;
      // Tabla
      if(mvr.length){
        vc.appendChild(div('tw',`<table><thead><tr><th>Fecha</th><th>KM</th><th>Dist.</th><th>L</th><th>Monto</th><th>km/L</th><th>Estado</th></tr></thead><tbody>${mvr.map(r=>{const k=kpl(r),an=k&&ga&&Math.abs(k-ga)>Math.max(ga*.35,.3);return`<tr><td style="white-space:nowrap">${fd(r.date)}</td><td style="font-family:monospace;font-size:12px">${numFmt(r.km1)}</td><td class="t2 sm">${(r.km1||0)-(r.km0||0)}km</td><td>${r.L}L</td><td class="fw6">$${(r.amt||0).toFixed(2)}</td><td style="font-weight:700;color:${an?'var(--r)':'var(--g)'}">${k||'—'}</td><td>${an?'<span class="bdg b-dn" style="font-size:10px;padding:2px 6px">⚠️</span>':'<span class="bdg b-ok" style="font-size:10px;padding:2px 6px">✓</span>'}</td></tr>`;}).join('')}</tbody></table>`));
      }else{vc.innerHTML+='<div class="tc t3 sm" style="padding:16px">Sin registros este mes</div>';}
      d.appendChild(vc);
    });
    setTimeout(initHistChart,50);
  }
  setTimeout(()=>{fltVehs();renderHistContent();$('_hs')?.addEventListener('input',fltVehs);$('_hr')?.addEventListener('change',fltVehs);},25);
  return w;
}

// ═══════════ ALERTS ═══════════
function renderAlerts(){
  const alts=anomalies();const w=div('','');
  if(!alts.length){w.innerHTML='<div class="card tc" style="padding:48px"><div style="font-size:44px;margin-bottom:10px;opacity:.3"><i class="ti ti-shield-check" style="color:var(--g)"></i></div><div style="font-size:16px;font-weight:700;margin-bottom:5px;color:var(--g)">Todo normal</div><div class="xs t3">No se detectaron consumos anómalos</div></div>';return w;}
  w.innerHTML=`<div class="card mb14" style="padding:12px 16px;background:rgba(234,179,8,.04);border-color:rgba(234,179,8,.2)"><div class="fw6 mb6" style="color:var(--y);font-size:13px">Detección automática</div><div class="xs t3">Se compara cada carga con el promedio histórico. Desviación mayor al 35% genera alerta.</div></div>`;
  alts.forEach(a=>{const r=RECS.find(x=>x.id===a.rid);w.innerHTML+=`<div style="display:flex;gap:10px;padding:14px 16px;border-radius:var(--rl);background:rgba(${a.sev==='danger'?'239,68,68':'234,179,8'},.06);border-left:3px solid var(--${a.sev==='danger'?'r':'y'});margin-bottom:10px"><i class="ti ti-alert-triangle" style="font-size:18px;color:var(--${a.sev==='danger'?'r':'y'});flex-shrink:0;margin-top:2px"></i><div style="flex:1"><div class="fl jb ic mb6" style="flex-wrap:wrap;gap:6px"><div class="fw6" style="font-size:14px">${a.plate} · ${fd(a.date)}</div><span class="bdg ${a.sev==='danger'?'b-dn':'b-wn'}">${a.sev==='danger'?'Crítico':'Advertencia'}</span></div><div class="sm t2 mb6">${a.msg}</div><div class="fl xs t3" style="gap:12px;flex-wrap:wrap"><span>km/L: <strong style="color:var(--t1)">${a.k}</strong></span><span>Prom.: <strong style="color:var(--t1)">${a.avg}</strong></span>${r?`<span>Litros: <strong style="color:var(--t1)">${r.L}L</strong></span><span>Monto: <strong style="color:var(--t1)">$${r.amt}</strong></span>`:''}</div></div></div>`;});
  return w;
}

// ═══════════ EXCEL ═══════════
function exportAll(){
  const rows=RECS.map(r=>{const v=VEHS.find(x=>(x.id||x.plate)===r.vid);return{'Fecha':r.date,'Placa':v?.plate||r.vid,'Conductor':v?.driver||'','Región':v?.region||'','KM llenado':r.km1,'KM anterior':r.km0,'Distancia':((r.km1||0)-(r.km0||0)),'Litros':r.L,'Monto($)':r.amt,'km/L':kpl(r)||'—','Estación':r.sta||'','Conductor carga':r.driver_name||'','Notas':r.note||''};});
  if(!rows.length){toast('Sin datos para exportar','var(--y)');return;}
  const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Historial');
  XLSX.writeFile(wb,`FlotaCombustible_${CY}.xlsx`);toast('Excel descargado');
}
function exportFleet(){
  const rows=VEHS.map(v=>{const vr=RECS.filter(r=>r.vid===(v.id||v.plate)),kpls=vr.map(r=>kpl(r)).filter(Boolean);return{'Región':v.region||'','Placa':v.plate,'Conductor':v.driver||'','Tipo':v.type||'','KM Actual':v.km||0,'Total Litros':vr.reduce((s,r)=>s+r.L,0).toFixed(1),'Total Gasto($)':vr.reduce((s,r)=>s+r.amt,0).toFixed(2),'Prom. km/L':kpls.length?(kpls.reduce((s,x)=>s+x,0)/kpls.length).toFixed(2):'—','Cargas':vr.length};});
  const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Flota');
  XLSX.writeFile(wb,`Flota_${new Date().toISOString().split('T')[0]}.xlsx`);toast('Excel de flota descargado');
}
function exportMulti(vids,month,year){
  if(!vids||!vids.length){toast('Selecciona al menos un vehículo','var(--y)');return;}
  const wb=XLSX.utils.book_new();let has=false;
  vids.forEach(vid=>{
    const v=VEHS.find(x=>(x.id||x.plate)===vid);if(!v)return;
    const rows=RECS.filter(r=>r.vid===vid&&new Date(r.date).getMonth()===month&&new Date(r.date).getFullYear()===year).map(r=>({'Fecha':r.date,'Placa':v.plate,'Conductor carga':r.driver_name||'','KM llenado':r.km1,'KM anterior':r.km0,'Distancia':((r.km1||0)-(r.km0||0)),'Litros':r.L,'Monto($)':r.amt,'km/L':kpl(r)||'—','Estación':r.sta||'','Notas':r.note||''}));
    if(!rows.length)return;
    const ws=XLSX.utils.json_to_sheet(rows);XLSX.utils.book_append_sheet(wb,ws,v.plate.replace(/[^a-zA-Z0-9-]/g,'').slice(0,31));has=true;
  });
  if(!has){toast('Sin registros para el período','var(--y)');return;}
  XLSX.writeFile(wb,`Historial_${MS[month]}_${year}.xlsx`);toast(`Excel descargado — ${vids.length} placa(s)`);
}
